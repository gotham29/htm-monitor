usecase: demo_synth
sources:
- name: sA
  path: data/demo_synth/sA.csv
  timestamp_col: timestamp
  timestamp_format: '%Y-%m-%d %H:%M:%S'
  fields:
    sA: value
- name: sB
  path: data/demo_synth/sB.csv
  timestamp_col: timestamp
  timestamp_format: '%Y-%m-%d %H:%M:%S'
  fields:
    sB: value
- name: sC
  path: data/demo_synth/sC.csv
  timestamp_col: timestamp
  timestamp_format: '%Y-%m-%d %H:%M:%S'
  fields:
    sC: value
params:
  rdse_size: 2048
  rdse_active_bits: 40
  rdse_num_buckets: 80
  seed_base: 42
  low_q: 0.01
  high_q: 0.99
  margin: 0.03
  model_layout: separate
  decision_score_key: anomaly_probability
  decision_threshold: 0.99
  decision_method: kofn_window
  decision_k: 2
  decision_window_size: 24
  decision_per_model_hits: 2
  run_warmup_steps: 500
  run_learn_after_warmup: true
  plot_enable: true
  plot_window: 300
  plot_show_ground_truth: true
  plot_step_pause_s: 0.01
  plot_show_warmup_span: true
calibration:
  method: quantile
  low_q: 0.01
  high_q: 0.99
  margin: 0.03
overrides:
  features: {}
