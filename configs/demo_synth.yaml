features:
  timestamp:
    type: datetime
    format: '%Y-%m-%d %H:%M:%S'
    timeOfDay: 21
    weekend: 0
    dayOfWeek: 0
    holiday: 0
    season: 0
    encode: false
  sA:
    type: float
    size: 2048
    activeBits: 40
    numBuckets: 80
    minVal: 100.9042610084704
    maxVal: 133.14710131285148
    seed: 42
  sB:
    type: float
    size: 2048
    activeBits: 40
    numBuckets: 80
    minVal: 49.57185729490177
    maxVal: 72.07245515365543
    seed: 43
  sC:
    type: float
    size: 2048
    activeBits: 40
    numBuckets: 80
    minVal: 241.65811144347848
    maxVal: 285.13829558740554
    seed: 44
models:
  sA_model:
    sources:
    - sA
    features:
    - sA
  sB_model:
    sources:
    - sB
    features:
    - sB
  sC_model:
    sources:
    - sC
    features:
    - sC
data:
  timebase:
    mode: union
    on_missing: hold_last
  sources:
  - name: sA
    kind: csv
    path: data/demo_synth/sA.csv
    timestamp_col: timestamp
    timestamp_format: '%Y-%m-%d %H:%M:%S'
    fields:
      sA: value
    labels:
      timestamps:
      - '2015-03-28 00:00:00'
      - '2015-04-01 12:00:00'
      - '2015-04-07 04:00:00'
  - name: sB
    kind: csv
    path: data/demo_synth/sB.csv
    timestamp_col: timestamp
    timestamp_format: '%Y-%m-%d %H:%M:%S'
    fields:
      sB: value
    labels:
      timestamps:
      - '2015-03-29 12:00:00'
      - '2015-04-01 12:00:00'
      - '2015-04-12 20:00:00'
  - name: sC
    kind: csv
    path: data/demo_synth/sC.csv
    timestamp_col: timestamp
    timestamp_format: '%Y-%m-%d %H:%M:%S'
    fields:
      sC: value
    labels:
      timestamps:
      - '2015-03-31 00:00:00'
      - '2015-04-07 04:00:00'
      - '2015-04-12 20:00:00'
run:
  warmup_steps: 500
  learn_after_warmup: true
decision:
  score_key: anomaly_probability
  threshold: 0.99
  method: kofn_window
  k: 2
  window:
    size: 24
    per_model_hits: 2
plot:
  enable: true
  step_pause_s: 0.01
  window: 300
  show_ground_truth: true
  show_warmup_span: true
ground_truth:
  system:
    method: kofn_window
    k: 2
    window:
      size: 24
      per_source_hits: 1
