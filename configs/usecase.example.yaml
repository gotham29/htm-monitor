# ------------------------------------------------------------------
# HTM-Monitor example config
#
# Purpose:
#   - demonstrate config schema / semantics fields
#   - serve as a starting template for real use cases
#
# Important:
#   - this file is NOT tied to a specific checked-in run artifact
#   - paths and GT timestamps below are illustrative placeholders/examples
#   - do not expect analyze_run to succeed against an unrelated run.csv
# ------------------------------------------------------------------

features:
  timestamp:
    type: datetime
    format: '%Y-%m-%d %H:%M:%S'
    timeOfDay: 21
    weekend: 0
    dayOfWeek: 0
    holiday: 0
    season: 0
  exchange-4_cpc_results:
    type: float
    size: 2048
    activeBits: 40
    numBuckets: 80
    minVal: 0.02391594801240673
    maxVal: 0.255481153489977
    seed: 42
  exchange-4_cpm_results:
    type: float
    size: 2048
    activeBits: 40
    numBuckets: 80
    minVal: 0.13282663188006844
    maxVal: 1.58704862331941
    seed: 43
models:
  exchange-4_cpc_results_model:
    sources:
    - exchange-4_cpc_results
    features:
    - timestamp
    - exchange-4_cpc_results
  exchange-4_cpm_results_model:
    sources:
    - exchange-4_cpm_results
    features:
    - timestamp
    - exchange-4_cpm_results
data:
  timebase:
    mode: union
    on_missing: hold_last
  sources:
  - name: exchange-4_cpc_results
    kind: csv
    path: /path/to/NAB/realAdExchange/realAdExchange/exchange-4_cpc_results.csv
    timestamp_col: timestamp
    timestamp_format: '%Y-%m-%d %H:%M:%S'
    fields:
      exchange-4_cpc_results: value
    labels:
      timestamps:
      - '2011-07-16 09:15:01'
      - '2011-08-02 12:15:01'
      - '2011-08-23 08:15:01'
  - name: exchange-4_cpm_results
    kind: csv
    path: /path/to/NAB/realAdExchange/realAdExchange/exchange-4_cpm_results.csv
    timestamp_col: timestamp
    timestamp_format: '%Y-%m-%d %H:%M:%S'
    fields:
      exchange-4_cpm_results: value
    labels:
      timestamps:
      - '2011-07-16 09:15:01'
      - '2011-08-01 07:15:01'
      - '2011-08-23 08:15:01'
      - '2011-08-28 13:15:01'
run:
  warmup_steps: 300
  learn_after_warmup: true

learning:
  mode: online_continuous
  notes: >
    Semantic learning policy for this use case.
    Accepted for schema clarity now; runtime behavior may still be driven
    by run.warmup_steps and run.learn_after_warmup until train/freeze mode
    is implemented in the pipeline.

decision:
  score_key: anomaly_probability
  threshold: 0.997
  method: kofn_window
  k: 2
  window:
    size: 24
    per_model_hits: 2

evaluation:
  mode: onset_detection
  notes: >
    Semantic evaluation mode for this use case.
    onset_detection means GT timestamps represent abnormal-regime onset and
    alerts should occur shortly after GT.
    Future modes may include predictive_warning, where GT represents a future
    event or warning horizon and alerts should occur before it.

  # IMPORTANT:
  # The timestamps in this example file are illustrative NAB-style examples.
  # If you run analyze_run with this config, the run.csv must come from the
  # same underlying dataset/timeline or strict GT mapping will fail.

  # Example future predictive-warning schema:
  # predictive_warning:
  #   event_type: failure_horizon
  #   target_source: system
  #   warning_window:
  #     start_steps_before_event: 30
  #     end_steps_before_event: 5
  #   too_early_window:
  #     min_steps_before_event: 31
plot:
  enable: true
  step_pause_s: 0.01
  window: 1000
  show_ground_truth: true
  show_warmup_span: true
ground_truth:
  system:
    method: kofn_window
    k: 2
    window:
      size: 24
      per_source_hits: 1
