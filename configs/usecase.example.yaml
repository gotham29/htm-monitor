features:
  timestamp:
    type: datetime
    format: '%Y-%m-%d %H:%M:%S'
    timeOfDay: 21
    weekend: 0
    dayOfWeek: 0
    holiday: 0
    season: 0
  exchange-4_cpc_results:
    type: float
    size: 2048
    activeBits: 40
    numBuckets: 80
    minVal: 0.02391594801240673
    maxVal: 0.255481153489977
    seed: 42
  exchange-4_cpm_results:
    type: float
    size: 2048
    activeBits: 40
    numBuckets: 80
    minVal: 0.13282663188006844
    maxVal: 1.58704862331941
    seed: 43
models:
  exchange-4_cpc_results_model:
    sources:
    - exchange-4_cpc_results
    features:
    - timestamp
    - exchange-4_cpc_results
  exchange-4_cpm_results_model:
    sources:
    - exchange-4_cpm_results
    features:
    - timestamp
    - exchange-4_cpm_results
data:
  timebase:
    mode: union
    on_missing: hold_last
  sources:
  - name: exchange-4_cpc_results
    kind: csv
    path: /path/to/NAB/realAdExchange/realAdExchange/exchange-4_cpc_results.csv
    timestamp_col: timestamp
    timestamp_format: '%Y-%m-%d %H:%M:%S'
    fields:
      exchange-4_cpc_results: value
    labels:
      timestamps:
      - '2011-07-16 09:15:01'
      - '2011-08-02 12:15:01'
      - '2011-08-23 08:15:01'
  - name: exchange-4_cpm_results
    kind: csv
    path: /path/to/NAB/realAdExchange/realAdExchange/exchange-4_cpm_results.csv
    timestamp_col: timestamp
    timestamp_format: '%Y-%m-%d %H:%M:%S'
    fields:
      exchange-4_cpm_results: value
    labels:
      timestamps:
      - '2011-07-16 09:15:01'
      - '2011-08-01 07:15:01'
      - '2011-08-23 08:15:01'
      - '2011-08-28 13:15:01'
run:
  warmup_steps: 300
  learn_after_warmup: true
decision:
  score_key: anomaly_probability
  threshold: 0.997
  method: kofn_window
  k: 2
  window:
    size: 24
    per_model_hits: 2
plot:
  enable: true
  step_pause_s: 0.01
  window: 1000
  show_ground_truth: true
  show_warmup_span: true
ground_truth:
  system:
    method: kofn_window
    k: 2
    window:
      size: 24
      per_source_hits: 1
