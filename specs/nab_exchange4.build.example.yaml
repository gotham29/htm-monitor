usecase: nab_exchange4
sources:
- name: exchange-4_cpc_results
  path: /path/to/NAB/realAdExchange/realAdExchange/exchange-4_cpc_results.csv
  timestamp_col: timestamp
  timestamp_format: '%Y-%m-%d %H:%M:%S'
  fields:
    exchange-4_cpc_results: value
  gt_timestamps:
  - '2011-07-16 09:15:01'
  - '2011-08-02 12:15:01'
  - '2011-08-23 08:15:01'
- name: exchange-4_cpm_results
  path: /path/to/NAB/realAdExchange/realAdExchange/exchange-4_cpm_results.csv
  timestamp_col: timestamp
  timestamp_format: '%Y-%m-%d %H:%M:%S'
  fields:
    exchange-4_cpm_results: value
  gt_timestamps:
  - '2011-07-16 09:15:01'
  - '2011-08-01 07:15:01'
  - '2011-08-23 08:15:01'
  - '2011-08-28 13:15:01'
params:
  rdse_size: 2048
  rdse_active_bits: 40
  rdse_num_buckets: 80
  seed_base: 42
  low_q: 0.01
  high_q: 0.99
  margin: 0.03
  model_layout: separate
  chunk_size: 2
  decision_method: kofn_window
  decision_k: 2
  decision_window_size: 24
  decision_per_model_hits: 2
  decision_threshold: 0.997
  decision_score_key: anomaly_probability
  run_warmup_steps: 300
  run_learn_after_warmup: true
calibration:
  method: quantile
  low_q: 0.01
  high_q: 0.99
  margin: 0.03
  hist_bins: 80
  min_floor: 0.0
overrides:
  features: {}
