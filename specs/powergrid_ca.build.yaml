params:
  rdse_size: 2048
  rdse_active_bits: 40
  rdse_num_buckets: 130
  seed_base: 42
  low_q: 0.01
  high_q: 0.99
  margin: 0.05
  model_layout: separate
  chunk_size: 2
  timebase_mode: union
  on_missing: hold_last
  decision_method: kofn_window
  decision_k: 2
  decision_window_size: 12
  decision_per_model_hits: 5
  decision_threshold: 0.99
  decision_score_key: anomaly_probability
  run_warmup_steps: 1000
  decision_grouping_enabled: true
  decision_grouping_k: 2
  decision_grouping_min_consecutive_group_steps: 2
  decision_grouping_min_alert_len: 6
  decision_grouping_groups:
    gr_demand:
    - demand_model
    gr_generation:
    - net_generation_model
    gr_imbalance:
    - imbalance_model
    - imbalance_delta_model
    - imbalance_residual_model
  run_learn_after_warmup: true
  plot_max_label_len: 16
  plot_label_color_mode: by_group
  plot_model_label_colors: null
calibration:
  method: quantile
  low_q: 0.01
  high_q: 0.99
  margin: 0.05
  hist_bins: 130
  min_floor: null
overrides:
  features: {}
